name: Daily price forecast (v3)

on:
  schedule:
    - cron: "0 20 * * *"     # evening - yesterday's price + system price have published
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  forecast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python predict_price.py
      - name: Commit prediction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add price_predictions_log.csv
          git commit -m "price forecast $(date -u +%Y-%m-%d)" || echo "nothing to commit"
          git push
